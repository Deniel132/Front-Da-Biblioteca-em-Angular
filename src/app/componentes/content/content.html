
<div class="conteudo">
  <img class="imagem" src="https://viagem.cnnbrasil.com.br/wp-content/uploads/sites/5/2025/02/Assador_credito-divulgacao.jpg?w=849&h=477&crop=0" alt="PratoInicial">

  <div class="principal">
    <h4>Controle de Clientes</h4>

    <div class="acoes-container">

      <div class="cliente-card">
        <h2>Cadastro de Clientes</h2>
        <div class="id-container">
          <h3>Status:</h3>
          <h2 id="imput" class="id-display">
            ...  </h2>
        </div>
        <input type="text"   placeholder="Nome do Cliente" [(ngModel)]="nome" )]>
        <input type="text" id="email" placeholder="E-mail" [(ngModel)]="email">
        <input type="date" id="data" [(ngModel)]="data">

        @if (!editar) {
          <button (click)="setInfo()" class="button">Cadastrar</button>
        } @else {
          <button (click)="alter()" class="button">Editar</button>
        }

        <h2 id="postInfo" style="font-size: 1rem; color: #30d64c;"></h2>
      </div>

      <div class="cliente-card">
        <h2>Clientes no Base</h2>
        <button (click)="getInfo()" class="button" style="background-color: #2d3436;">Atualizar Lista</button>

        <div class="lista-scroll">
          @for (cliente of ListaDeClientes(); track cliente.id){
            <div class="cliente-item"
                 [class.cliente-inativo]="!cliente.status"
                 [class.cliente-ativo]="cliente.status" >

              <span >{{cliente.id}} | {{cliente.nome}} | {{cliente.email}} </span>

              @if (!cliente.status) {
                <button class="button" (click)="reativar(cliente.id)">Ativar</button>
              }@else{

              }

              <button class="buttonEditar" (click)="editarCliente(cliente.id,cliente)">Editar</button>
              <button class="buttonDeletar" (click)="deletar(cliente.id)">Deletar</button>


            </div>
          }
        </div>
        <button (click)="deletarTodos()" class="buttonDeletar">Deletar Todos</button>
      </div>

    </div>
  </div>

</div>
